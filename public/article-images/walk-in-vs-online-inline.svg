<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc"><title id="title">Choosing walk in or online application</title><desc id="desc">Illustration showing when to use walk in interviews versus online applications for different job-search situations.</desc><rect width="1200" height="720" fill="#f8fafc"/><text x="120" y="170" font-size="48" font-family="Arial, sans-serif" font-weight="700" fill="#0f172a">Choose by employer and role</text><rect x="120" y="240" width="380" height="260" rx="30" fill="#ffffff" stroke="#cbd5e1" stroke-width="8"/><rect x="700" y="240" width="380" height="260" rx="30" fill="#ffffff" stroke="#cbd5e1" stroke-width="8"/><text x="220" y="330" font-size="44" font-family="Arial, sans-serif" font-weight="700" fill="#0f172a">Walk-In</text><text x="810" y="330" font-size="44" font-family="Arial, sans-serif" font-weight="700" fill="#0f172a">Online</text><text x="180" y="400" font-size="26" font-family="Arial, sans-serif" font-weight="700" fill="#0f766e">Urgent hiring</text><text x="770" y="400" font-size="26" font-family="Arial, sans-serif" font-weight="700" fill="#1d4ed8">Brand portals</text></svg>
