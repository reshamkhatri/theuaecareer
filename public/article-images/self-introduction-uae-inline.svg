<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc"><title id="title">Interview introduction formula</title><desc id="desc">Simple visual showing a formula for interview self introduction using name, role, experience, and availability.</desc><rect width="1200" height="720" fill="#f8fafc"/><rect x="110" y="120" width="980" height="480" rx="34" fill="#ffffff" stroke="#cbd5e1" stroke-width="8"/><text x="170" y="230" font-size="42" font-family="Arial, sans-serif" font-weight="700" fill="#4338ca">Formula</text><rect x="170" y="290" width="200" height="86" rx="24" fill="#e0e7ff"/><rect x="410" y="290" width="200" height="86" rx="24" fill="#dbeafe"/><rect x="650" y="290" width="200" height="86" rx="24" fill="#ccfbf1"/><rect x="890" y="290" width="140" height="86" rx="24" fill="#fde68a"/><text x="220" y="345" font-size="30" font-family="Arial, sans-serif" font-weight="700" fill="#312e81">Name</text><text x="472" y="345" font-size="30" font-family="Arial, sans-serif" font-weight="700" fill="#1d4ed8">Role</text><text x="692" y="345" font-size="30" font-family="Arial, sans-serif" font-weight="700" fill="#0f766e">Experience</text><text x="915" y="345" font-size="30" font-family="Arial, sans-serif" font-weight="700" fill="#92400e">Ready</text></svg>
